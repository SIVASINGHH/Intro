<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Link Generator | @smss1708</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&family=Dancing+Script:wght@700&display=swap');
        
        body {
            background: radial-gradient(circle at center, #1a002a 0%, #000000 100%);
            font-family: 'Poppins', sans-serif;
            color: white; min-height: 100vh; overflow-x: hidden;
        }

        .insta-tag {
            position: fixed; top: 15px; width: 100%; text-align: center;
            font-weight: 700; color: #ff00cc; letter-spacing: 2px;
            text-shadow: 0 0 10px #ff00cc; z-index: 100; font-size: 0.9rem;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 30px;
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.5);
        }

        .neon-input {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white; transition: 0.3s;
        }
        .neon-input:focus {
            border-color: #ff00cc; box-shadow: 0 0 15px rgba(255, 0, 204, 0.3);
            outline: none;
        }

        .generate-btn {
            background: linear-gradient(45deg, #ff00cc, #764ba2);
            transition: 0.4s; font-weight: 700;
        }
        .generate-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(255, 0, 204, 0.5);
        }

        .template-card {
            cursor: pointer; transition: 0.3s;
            border: 2px solid transparent;
        }
        .template-card.selected {
            border-color: #ff00cc; background: rgba(255, 0, 204, 0.1);
            transform: scale(1.05);
        }

        #resultArea { display: none; }
    </style>
</head>
<body class="flex items-center justify-center p-4">

    <div class="insta-tag">insta - @smss1708</div>

    <div class="app-container w-full max-w-md mt-12">
        <div class="glass-card p-8">
            <h1 class="text-3xl font-bold text-center mb-2" style="font-family: 'Dancing Script';">Create a Surprise</h1>
            <p class="text-gray-400 text-center text-sm mb-8">Generate a romantic link for your favorite person</p>

            <div class="mb-6">
                <label class="block text-xs uppercase tracking-widest text-gray-400 mb-2 ml-1">Person Name</label>
                <input type="text" id="targetName" placeholder="Enter name (e.g. Anushka)" 
                       class="w-full neon-input rounded-2xl p-4 text-lg">
            </div>

            <label class="block text-xs uppercase tracking-widest text-gray-400 mb-3 ml-1">Choose Vibe</label>
            <div class="grid grid-cols-2 gap-3 mb-8">
                <div class="template-card glass-card p-3 text-center rounded-2xl" onclick="selectTemplate('birthday.html', this)">
                    <span class="text-2xl">🎂</span><p class="text-xs mt-1">Birthday</p>
                </div>
                <div class="template-card glass-card p-3 text-center rounded-2xl" onclick="selectTemplate('love.html', this)">
                    <span class="text-2xl">💖</span><p class="text-xs mt-1">Proposal</p>
                </div>
                <div class="template-card glass-card p-3 text-center rounded-2xl" onclick="selectTemplate('morning.html', this)">
                    <span class="text-2xl">☀️</span><p class="text-xs mt-1">Morning</p>
                </div>
                <div class="template-card glass-card p-3 text-center rounded-2xl" onclick="selectTemplate('sorry.html', this)">
                    <span class="text-2xl">🙏</span><p class="text-xs mt-1">Sorry</p>
                </div>
            </div>

            <button onclick="generateLink()" class="generate-btn w-full py-4 rounded-2xl text-lg mb-4">
                Generate Magical Link ✨
            </button>

            <div id="resultArea" class="animate-pulse">
                <div class="bg-black/40 p-4 rounded-xl border border-dashed border-pink-500/50">
                    <p class="text-[10px] text-gray-400 mb-1">YOUR UNIQUE LINK:</p>
                    <p id="generatedLink" class="text-pink-400 text-sm break-all font-mono"></p>
                    <button onclick="copyLink()" class="mt-3 text-xs text-white bg-white/10 px-4 py-2 rounded-lg hover:bg-white/20">
                        Copy to Clipboard 📋
                    </button>
                </div>
            </div>
        </div>
        
        <p class="text-center mt-6 text-gray-500 text-xs">Made by - @smss1708 | 2026 Edition</p>
    </div>

    <script>
        // --- FIREBASE CONFIG (Replace with your own) ---
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_AUTH_DOMAIN",
            databaseURL: "YOUR_DATABASE_URL",
            projectId: "YOUR_PROJECT_ID",
            storageBucket: "YOUR_STORAGE_BUCKET",
            messagingSenderId: "YOUR_SENDER_ID",
            appId: "YOUR_APP_ID"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let selectedFile = "";

        function selectTemplate(file, element) {
            selectedFile = file;
            document.querySelectorAll('.template-card').forEach(c => c.classList.remove('selected'));
            element.classList.add('selected');
        }

        async function generateLink() {
            const name = document.getElementById('targetName').value.trim();
            if(!name || !selectedFile) {
                alert("Bhai, naam likho aur template select karo!");
                return;
            }

            const uniqueId = "smss-" + Math.random().toString(36).substr(2, 9);
            
            // Push to Firebase
            try {
                await db.ref("dynamic_links/" + uniqueId).set({
                    targetName: name,
                    template: selectedFile,
                    createdAt: Date.now()
                });

                const finalLink = window.location.origin + "/" + selectedFile + "?id=" + uniqueId;
                document.getElementById('generatedLink').innerText = finalLink;
                document.getElementById('resultArea').style.display = 'block';
            } catch (error) {
                alert("Error: Firebase check karo!");
            }
        }

        function copyLink() {
            const link = document.getElementById('generatedLink').innerText;
            navigator.clipboard.writeText(link);
            alert("Link Copied! Ab send kar do 🚀");
        }
    </script>
</body>
</html>
